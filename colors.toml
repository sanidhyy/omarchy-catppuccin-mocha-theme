# =============================================
# colors.toml - Catppuccin Mocha
# =============================================

accent = "#f5c2e7"                # accent color (used for highlights, active elements)
cursor = "#f5e0dc"                # cursor color
foreground = "#cdd6f4"            # default text color
background = "#11111b"            # main terminal background (very dark)
selection_foreground = "#1e1e2e"  # text color when selected
selection_background = "#f5e0dc"  # background color when selected

# Standard ANSI Colors
color0 = "#45475a"              # black
color1 = "#f38ba8"              # red
color2 = "#a6e3a1"              # green
color3 = "#f9e2af"              # yellow
color4 = "#89b4fa"              # blue
color5 = "#f5c2e7"              # magenta / pink
color6 = "#94e2d5"              # cyan
color7 = "#bac2de"              # white

# Bright / Bold ANSI Colors
color8 = "#585b70"              # bright black (gray)
color9 = "#f38ba8"              # bright red
color10 = "#a6e3a1"             # bright green
color11 = "#f9e2af"             # bright yellow
color12 = "#89b4fa"             # bright blue
color13 = "#f5c2e7"             # bright magenta
color14 = "#94e2d5"             # bright cyan
color15 = "#a6adc8"             # bright white
